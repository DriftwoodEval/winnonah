<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="10" />
  <title>Updating&hellip;</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; padding: 0; margin: 0; }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: Inter, -apple-system, sans-serif;
      color: oklch(0.985 0 0);
      background: oklch(0.19 0.018 65);
    }

    header span {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    main {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 2.5rem 3rem;
      text-align: center;
      background: oklch(0.26 0.014 65);
      border: 1px solid oklch(1 0 0 / 10%);
      border-radius: 0.625rem;
      box-shadow: 0 1px 3px 0 hsl(0 0% 0% / 0.25);
    }

    .spinner {
      width: 2rem;
      height: 2rem;
      margin: 0 auto 1.5rem;
      border: 2.5px solid oklch(0.28 0.012 68);
      border-top-color: oklch(0.62 0.13 143);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h2 {
      margin-bottom: 0.375rem;
      font-size: 1rem;
      font-weight: 600;
    }

    p {
      font-size: 0.875rem;
      color: oklch(0.708 0 0);
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="spinner"></div>
      <h2>Updating&hellip;</h2>
      <p>We&rsquo;ll be right back. This page will refresh automatically.</p>
    </div>
  </main>
</body>
</html>
