name: Build Check

on:
  pull_request:
    branches:
      - main
      - renovate/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build
        run: SKIP_ENV_VALIDATION=1 pnpm next build

  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Python test image
        uses: docker/build-push-action@v7
        with:
          context: ./python
          file: ./python/Dockerfile
          target: test
          load: true
          tags: winnonah-python-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Python tests
        run: docker run --rm -e HEADLESS=true winnonah-python-test:ci
