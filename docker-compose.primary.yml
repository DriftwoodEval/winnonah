services:
  driftwood-db:
    restart: always
    volumes:
      - winnonah_db-data:/var/lib/mysql
      - ./mysql/primary.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - ./mysql/init-primary.sh:/docker-entrypoint-initdb.d/01-replication.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: always

  cloudflared:
    restart: no

  winnonah:
    restart: no

  winnonah-python:
    restart: no
