services:
  winnonah:
    restart: no
    image: ghcr.io/driftwoodeval/winnonah:latest
    container_name: winnonah
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=${AUTH_URL}
      - PUNCHLIST_ID=${PUNCHLIST_ID}
      - PUNCHLIST_RANGE=${PUNCHLIST_RANGE}
      - REDIS_HOST=${DOCKER_REDIS_HOST}
      - OPENPHONE_API_TOKEN=${OPENPHONE_API_TOKEN}
      - OPENPHONE_NUMBER_ID=${OPENPHONE_NUMBER_ID}
      - API_KEY=${API_KEY}
      - NEXT_PUBLIC_APP_TITLE=${NEXT_PUBLIC_APP_TITLE}
      - NEXT_PUBLIC_APP_DOMAIN=${NEXT_PUBLIC_APP_DOMAIN}
      - PY_API=${DOCKER_PY_API}

    volumes:
      - ./logs:/app/logs
      - ../qs/logs/screenshots:/app/q-screenshots

  driftwood-db:
    image: mysql
    container_name: driftwood-db
    restart: no
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    ports:
      - 3306:3306
    volumes:
      - winnonah_db-data:/var/lib/mysql
      - ./mysql-replication.cnf:/etc/mysql/conf.d/replication.cnf:ro

  redis:
    image: redis:alpine
    container_name: redis-winnonah
    restart: always

  caddy:
    image: caddy:alpine
    container_name: caddy-winnonah
    restart: always
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/maintenance.html:/srv/maintenance.html
    depends_on:
      - winnonah

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-winnonah
    command: tunnel --no-autoupdate run --token
      ${CF_TOKEN}
    restart: no

  winnonah-python:
    image: ghcr.io/driftwoodeval/winnonah-python:latest
    container_name: winnonah-python
    restart: always
    environment:
      - HEADLESS=true
      - DATABASE_URL=${DOCKER_DATABASE_URL}
      - PUNCHLIST_ID=${PUNCHLIST_ID}
      - PUNCHLIST_RANGE=${PUNCHLIST_RANGE}
      - ASANA_TOKEN=${ASANA_TOKEN}
      - ASANA_WORKSPACE=${ASANA_WORKSPACE}
      - CENSUS_API_KEY=${CENSUS_API_KEY}
      - GEOCODIO_API_KEY=${GEOCODIO_API_KEY}
      - OPENPHONE_API_TOKEN=${OPENPHONE_API_TOKEN}
      - OPENPHONE_NUMBER_ID=${OPENPHONE_NUMBER_ID}
      - OPENPHONE_SIGNING_SECRET=${OPENPHONE_SIGNING_SECRET}
      - OPENPHONE_GREETER_NUMBER_ID=${OPENPHONE_GREETER_NUMBER_ID}
      - OPENPHONE_GREETER_SIGNING_SECRET=${OPENPHONE_GREETER_SIGNING_SECRET}
      - GREETER_SCHEDULE_SHEET_ID=${GREETER_SCHEDULE_SHEET_ID}
      - FAX_FOLDER_ID=${FAX_FOLDER_ID}
      - FAX_COMPLETED_FOLDER_ID=${FAX_COMPLETED_FOLDER_ID}
      - FAX_COVER_TEMPLATE_ID=${FAX_COVER_TEMPLATE_ID}
      - REPORT_FAX_FROM_EMAIL=${REPORT_FAX_FROM_EMAIL}
      - CLOSE_FAX_SPREADSHEET_ID=${CLOSE_FAX_SPREADSHEET_ID}
      - CLOSE_FAX_SHEET_TEMPLATE_ID=${CLOSE_FAX_SHEET_TEMPLATE_ID}
      - CLOSE_FAX_OUTBOX_FOLDER_ID=${CLOSE_FAX_OUTBOX_FOLDER_ID}
      - CLOSE_FAX_SENT_FOLDER_ID=${CLOSE_FAX_SENT_FOLDER_ID}
      - CLOSE_FAX_FROM_EMAIL=${CLOSE_FAX_FROM_EMAIL}
      - BASE_FOLDER_ID=${BASE_FOLDER_ID}
      - ERROR_EMAILS=${ERROR_EMAILS}
    volumes:
      - ./python/auth_cache:/app/auth_cache
      - ./python/temp:/app/temp
      - ./python/logs:/app/logs
      - ./python/shapefiles:/app/shapefiles
      - ./python/cache:/app/cache

  winnonah-docs:
    image: ghcr.io/driftwoodeval/winnonah-docs:latest
    container_name: winnonah-docs
    restart: no
    environment:
      - NODE_ENV=production

  loki:
    image: grafana/loki
    container_name: loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail
    container_name: promtail
    restart: always
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      - promtail-positions:/positions
      - ./logs:/app/logs
      - ./python/logs:/app/python-logs
      - ../qs/logs:/app/questionnaires-logs
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always

volumes:
  winnonah_db-data:
  loki-data:
  grafana-data:
  promtail-positions:
