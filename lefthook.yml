post-checkout:
  commands:
    install:
      run: mise x -- pnpm i --prefer-frozen-lockfile

post-merge:
  commands:
    install:
      run: mise x -- pnpm i --prefer-frozen-lockfile

pre-commit:
  parallel: true
  commands:
    betterleaks:
      run: mise x betterleaks -- betterleaks git --pre-commit --redact --staged --verbose --no-banner
    biome-check:
      run: mise x -- pnpm biome check --write {staged_files} --no-errors-on-unmatched --files-ignore-unknown=true --colors=off
      stage_fixed: true
    ruff:
      glob: "*.py"
      stage_fixed: true
      run: mise x -- uvx ruff check {staged_files} --fix --exit-non-zero-on-fix && mise x -- uvx ruff format {staged_files}
    deptry:
      root: "python/"
      run: mise x -- uv run deptry .
