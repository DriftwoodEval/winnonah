server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: winnonah-nodejs
    static_configs:
      - targets: [localhost]
        labels:
          service: winnonah
          __path__: /app/logs/debug.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: time
      - timestamp:
          source: ts
          format: UnixMs
      - labels:
          level:

  - job_name: winnonah-python
    static_configs:
      - targets: [localhost]
        labels:
          service: winnonah-python
          __path__: /app/python-logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: time
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          level:

  - job_name: questionnaires-qreceive
    static_configs:
      - targets: [localhost]
        labels:
          service: questionnaires
          app: qreceive
          __path__: /app/questionnaires-logs/qreceive.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: time
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          level:
