server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: winnonah-nodejs
    static_configs:
      - targets: [localhost]
        labels:
          service: winnonah
          app: winnonah
          __path__: /app/logs/debug.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: time
            user: user
            duration_ms: duration_ms
            path: path
      - regex:
          source: user
          expression: '^(?P<username>[^@]+)(?:@.*)?$'
      - timestamp:
          source: ts
          format: UnixMs
      - labels:
          level:
          username:

  - job_name: winnonah-python
    static_configs:
      - targets: [localhost]
        labels:
          service: winnonah-python
          __path__: /app/python-logs/*.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '/app/python-logs/(?P<app>[^.]+)\.log'
      - labels:
          app:
      - json:
          expressions:
            level: level
            ts: time
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          level:

  - job_name: questionnaires
    static_configs:
      - targets: [localhost]
        labels:
          service: questionnaires
          __path__: /app/questionnaires-logs/*.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '/app/questionnaires-logs/(?P<app>[^.]+)\.log'
      - labels:
          app:
      - json:
          expressions:
            level: level
            ts: time
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          level:
