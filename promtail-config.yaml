server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: winnonah-nodejs
    static_configs:
      - targets: [localhost]
        labels:
          service: winnonah
          __path__: /app/logs/debug.log
    pipeline_stages:
      - json:
          expressions:
            level: level
      - labels:
          level:

  - job_name: winnonah-python
    static_configs:
      - targets: [localhost]
        labels:
          service: winnonah-python
          __path__: /app/python-logs/*.log
    pipeline_stages:
      - regex:
          expression: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+ \| (?P<level>\S+)\s*\|'
      - labels:
          level:

  - job_name: questionnaires-qreceive
    static_configs:
      - targets: [localhost]
        labels:
          service: questionnaires
          app: qreceive
          __path__: /app/questionnaires-logs/qreceive.log
    pipeline_stages:
      - regex:
          expression: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+ \| (?P<level>\S+)\s*\|'
      - labels:
          level:
